<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Login')}"></head>
<body class="login-body">
<main class="login-shell">
    <section class="login-panel">
        <div class="login-brand">
            <i class="bi bi-mortarboard-fill"></i>
            <div>
                <h1>SIAKAD</h1>
                <p>Sistem Data Mahasiswa</p>
            </div>
        </div>

        <div th:if="${param.error}" class="alert alert-danger">Username atau password salah.</div>
        <div th:if="${param.logout}" class="alert alert-success">Anda berhasil keluar.</div>

        <form th:action="@{/login}" method="post" class="vstack gap-3">
            <div>
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input id="username" name="username" class="form-control" autocomplete="username" required autofocus>
                </div>
            </div>
            <div>
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required>
                </div>
            </div>
            <button class="btn btn-primary btn-lg w-100" type="submit">
                <i class="bi bi-box-arrow-in-right"></i> Masuk
            </button>
        </form>
        <div class="login-hint">Demo: <strong>admin</strong> / <strong>admin123</strong></div>
    </section>
</main>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
