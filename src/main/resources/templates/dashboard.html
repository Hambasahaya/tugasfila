<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Dashboard')}"></head>
<body>
<div th:replace="~{layout :: navbar(${activePage})}"></div>
<main class="container-fluid px-3 px-lg-4 py-4">
    <div class="page-heading">
        <div>
            <p class="eyebrow">Mini Project</p>
            <h1>Dashboard Akademik</h1>
        </div>
        <div class="d-flex gap-2" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/akademik/krs}" class="btn btn-success"><i class="bi bi-card-checklist"></i> Isi KRS</a>
            <a th:href="@{/mahasiswa/new}" class="btn btn-primary"><i class="bi bi-person-plus"></i> Mahasiswa</a>
            <a th:href="@{/dosen/new}" class="btn btn-outline-primary"><i class="bi bi-plus-circle"></i> Dosen</a>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-12 col-md-6 col-xl-3">
            <div class="metric-card">
                <div class="metric-icon bg-primary-subtle text-primary"><i class="bi bi-people-fill"></i></div>
                <div>
                    <span>Total Mahasiswa</span>
                    <strong th:text="${totalMahasiswa}">0</strong>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-xl-3">
            <div class="metric-card">
                <div class="metric-icon bg-success-subtle text-success"><i class="bi bi-person-workspace"></i></div>
                <div>
                    <span>Total Dosen</span>
                    <strong th:text="${totalDosen}">0</strong>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-xl-3">
            <div class="metric-card">
                <div class="metric-icon bg-warning-subtle text-warning"><i class="bi bi-database-check"></i></div>
                <div>
                    <span>Database</span>
                    <strong>MySQL</strong>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-xl-3">
            <div class="metric-card">
                <div class="metric-icon bg-info-subtle text-info"><i class="bi bi-shield-check"></i></div>
                <div>
                    <span>Login</span>
                    <strong>Aktif</strong>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-12 col-xl-6">
            <section class="content-panel">
                <div class="panel-title">
                    <h2>Mahasiswa Terbaru</h2>
                    <a th:href="@{/mahasiswa}" class="btn btn-sm btn-outline-secondary" sec:authorize="hasRole('ADMIN')">Lihat</a>
                </div>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead><tr><th>NIM</th><th>Nama</th><th>Program Studi</th></tr></thead>
                        <tbody>
                        <tr th:each="item : ${recentMahasiswa}">
                            <td th:text="${item.nim}">NIM</td>
                            <td th:text="${item.nama}">Nama</td>
                            <td><span class="badge text-bg-light" th:text="${item.programStudi}">Prodi</span></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(recentMahasiswa)}">
                            <td colspan="3" class="text-center text-secondary py-4">Belum ada data mahasiswa.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
        <div class="col-12 col-xl-6">
            <section class="content-panel">
                <div class="panel-title">
                    <h2>Dosen Terbaru</h2>
                    <a th:href="@{/dosen}" class="btn btn-sm btn-outline-secondary" sec:authorize="hasRole('ADMIN')">Lihat</a>
                </div>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead><tr><th>NIDN</th><th>Nama</th><th>Keahlian</th></tr></thead>
                        <tbody>
                        <tr th:each="item : ${recentDosen}">
                            <td th:text="${item.nidn}">NIDN</td>
                            <td th:text="${item.nama}">Nama</td>
                            <td><span class="badge text-bg-light" th:text="${item.keahlian}">Keahlian</span></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(recentDosen)}">
                            <td colspan="3" class="text-center text-secondary py-4">Belum ada data dosen.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>
</main>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
