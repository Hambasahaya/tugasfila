<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('KHS & Nilai')}"></head>
<body class="bg-light">

<nav th:replace="~{layout :: navbar('khs')}"></nav>

<div class="container py-4 px-3 px-lg-4">
    <div class="mb-4">
        <h4 class="mb-1 fw-bold"><i class="bi bi-file-earmark-text me-2"></i>Kartu Hasil Studi (KHS)</h4>
        <p class="text-muted mb-0">Lihat nilai dan rekapitulasi kehadiran Anda</p>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0 table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th class="px-4">Mata Kuliah</th>
                    <th>SKS</th>
                    <th class="text-center">Kehadiran (%)</th>
                    <th class="text-center">Nilai Angka</th>
                    <th class="text-center px-4">Nilai Huruf</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="krs : ${krsList}">
                    <td class="px-4">
                        <div class="fw-bold text-primary" th:text="${krs.jadwalKuliah.mataKuliah.nama}"></div>
                        <small class="text-muted" th:text="${krs.jadwalKuliah.dosen.nama}"></small>
                    </td>
                    <td th:text="${krs.jadwalKuliah.mataKuliah.sks}"></td>
                    <td class="text-center">
                        <div th:with="persen=${krs.getPersentaseKehadiran()}"
                             class="badge"
                             th:classappend="${persen < 75.0 ? 'bg-danger' : 'bg-success'}"
                             th:text="${#numbers.formatDecimal(persen, 1, 1)} + '%'">
                        </div>
                        <small class="d-block text-muted mt-1" th:if="${!krs.isAbsensiMemenuhi()}">Tidak penuhi syarat 75%</small>
                    </td>
                    <td class="text-center fw-semibold" th:text="${krs.nilaiAngka != null ? krs.nilaiAngka : '-'}"></td>
                    <td class="text-center px-4">
                        <span th:if="${krs.nilaiHuruf != null}" class="badge fs-6 px-3" 
                              th:classappend="${krs.nilaiHuruf == 'A' ? 'bg-success' : (krs.nilaiHuruf == 'B' ? 'bg-primary' : (krs.nilaiHuruf == 'E' ? 'bg-danger' : 'bg-warning'))}"
                              th:text="${krs.nilaiHuruf}"></span>
                        <span th:if="${krs.nilaiHuruf == null}" class="text-muted">-</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(krsList)}">
                    <td colspan="5" class="text-center py-5 text-muted">
                        <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                        Belum ada KHS. Anda belum mengambil KRS.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
