<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | SIAKAD'">SIAKAD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav th:fragment="navbar(activePage)" class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top">
    <div class="container-fluid px-3 px-lg-4">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/dashboard}">
            <i class="bi bi-mortarboard-fill"></i>
            <span>SIAKAD</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active' : ''" th:href="@{/dashboard}">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                
                <!-- Mahasiswa & Admin Menus -->
                <li class="nav-item" sec:authorize="hasAnyRole('MAHASISWA', 'ADMIN')">
                    <a class="nav-link" th:classappend="${activePage == 'krs'} ? 'active' : ''" th:href="@{/akademik/krs}">
                        <i class="bi bi-card-checklist"></i> KRS
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('MAHASISWA')">
                    <a class="nav-link" th:classappend="${activePage == 'khs'} ? 'active' : ''" th:href="@{/akademik/khs}">
                        <i class="bi bi-file-earmark-text"></i> KHS & Nilai
                    </a>
                </li>
                
                <!-- Dosen Menus -->
                <li class="nav-item" sec:authorize="hasRole('DOSEN')">
                    <a class="nav-link" th:classappend="${activePage == 'kelas_dosen'} ? 'active' : ''" th:href="@{/dosen-akademik/kelas}">
                        <i class="bi bi-journal-bookmark-fill"></i> Kelas & Nilai
                    </a>
                </li>

                <!-- Dosen & Mahasiswa Menus -->
                <li class="nav-item" sec:authorize="hasAnyRole('DOSEN', 'MAHASISWA')">
                    <a class="nav-link" th:classappend="${activePage == 'tugas'} ? 'active' : ''" th:href="@{/tugas}">
                        <i class="bi bi-journal-text"></i> Tugas
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'profil'} ? 'active' : ''" th:href="@{/profil}">
                        <i class="bi bi-person-circle"></i> Profil Saya
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'pengumuman'} ? 'active' : ''" th:href="@{/pengumuman}">
                        <i class="bi bi-megaphone"></i> Pengumuman
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:classappend="${activePage == 'mahasiswa'} ? 'active' : ''" th:href="@{/mahasiswa}">
                        <i class="bi bi-people"></i> Mahasiswa
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:classappend="${activePage == 'dosen'} ? 'active' : ''" th:href="@{/dosen}">
                        <i class="bi bi-person-workspace"></i> Dosen
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:classappend="${activePage == 'mata-kuliah'} ? 'active' : ''" th:href="@{/mata-kuliah}">
                        <i class="bi bi-book"></i> Mata Kuliah
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:classappend="${activePage == 'jadwal-kuliah'} ? 'active' : ''" th:href="@{/jadwal-kuliah}">
                        <i class="bi bi-calendar3"></i> Jadwal Kuliah
                    </a>
                </li>
                <li class="nav-item ms-lg-2">
                    <form th:action="@{/logout}" method="post">
                        <button class="btn btn-light btn-sm" type="submit">
                            <i class="bi bi-box-arrow-right"></i> Keluar
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</div>
</body>
</html>
