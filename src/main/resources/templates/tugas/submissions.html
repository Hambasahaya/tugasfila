<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Pengumpulan Tugas')}"></head>
<body class="bg-light">

<nav th:replace="~{layout :: navbar('tugas')}"></nav>

<div class="container py-4 px-3 px-lg-4">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/tugas}" class="btn btn-outline-secondary rounded-circle me-3" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h4 class="mb-1 fw-bold">Pengumpulan: <span th:text="${tugas.judul}"></span></h4>
            <p class="text-muted mb-0" th:text="'Deadline: ' + ${#temporals.format(tugas.deadline, 'dd MMM yyyy HH:mm')}"></p>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0 table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th class="px-4">NIM</th>
                    <th>Nama Mahasiswa</th>
                    <th>Waktu Pengumpulan</th>
                    <th>Status Keterlambatan</th>
                    <th style="width: 30%">Jawaban / Tautan</th>
                    <th class="text-center">Nilai</th>
                    <th class="text-center px-4">Aksi</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="pt : ${pengumpulanList}">
                    <td class="px-4 fw-semibold" th:text="${pt.mahasiswa.nim}"></td>
                    <td th:text="${pt.mahasiswa.nama}"></td>
                    <td th:text="${#temporals.format(pt.waktuKumpul, 'dd MMM yyyy HH:mm')}"></td>
                    <td>
                        <span class="badge bg-success" th:if="${pt.waktuKumpul.isBefore(tugas.deadline)}">Tepat Waktu</span>
                        <span class="badge bg-danger" th:if="${pt.waktuKumpul.isAfter(tugas.deadline)}">Terlambat</span>
                    </td>
                    <td>
                        <div class="bg-light p-2 rounded small" style="max-height: 80px; overflow-y: auto;" th:text="${pt.jawaban}"></div>
                    </td>
                    <form th:action="@{/tugas/nilai}" method="post">
                        <input type="hidden" name="pengumpulanId" th:value="${pt.id}">
                        <td class="text-center">
                            <input type="number" step="0.1" name="nilai" class="form-control form-control-sm text-center mx-auto" style="width: 80px;" th:value="${pt.nilai}" min="0" max="100" required>
                        </td>
                        <td class="text-center px-4">
                            <button type="submit" class="btn btn-sm btn-primary"><i class="bi bi-check2"></i> Simpan</button>
                        </td>
                    </form>
                </tr>
                <tr th:if="${#lists.isEmpty(pengumpulanList)}">
                    <td colspan="7" class="text-center py-4 text-muted">Belum ada mahasiswa yang mengumpulkan tugas ini.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
