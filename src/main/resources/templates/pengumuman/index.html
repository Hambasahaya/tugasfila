<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Data Pengumuman')}"></head>
<body class="bg-light">

<nav th:replace="~{layout :: navbar('pengumuman')}"></nav>

<div class="container py-4 px-3 px-lg-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-1 fw-bold"><i class="bi bi-megaphone me-2"></i>Pengumuman</h4>
            <p class="text-muted mb-0">Informasi dan pengumuman terbaru</p>
        </div>
        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/pengumuman/create}" class="btn btn-primary shadow-sm">
                <i class="bi bi-plus-lg me-1"></i> Tambah Pengumuman
            </a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row">
        <div class="col-12 mb-4" th:each="pengumuman : ${pengumumanList}">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title fw-bold text-primary mb-0" th:text="${pengumuman.judul}">Judul Pengumuman</h5>
                        <div sec:authorize="hasRole('ADMIN')">
                            <span class="badge bg-secondary me-2" th:text="'Target: ' + ${pengumuman.targetRole}"></span>
                            <a th:href="@{/pengumuman/edit/{id}(id=${pengumuman.id})}" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/pengumuman/delete/{id}(id=${pengumuman.id})}" class="btn btn-sm btn-outline-danger ms-1" onclick="return confirm('Yakin ingin menghapus pengumuman ini?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </div>
                    <h6 class="card-subtitle mb-3 text-muted" th:text="${#temporals.format(pengumuman.createdAt, 'dd MMMM yyyy HH:mm')}">Tanggal</h6>
                    <p class="card-text text-dark" th:text="${pengumuman.isi}" style="white-space: pre-wrap;">Isi pengumuman...</p>
                </div>
            </div>
        </div>
        <div class="col-12 text-center py-5 text-muted" th:if="${#lists.isEmpty(pengumumanList)}">
            <i class="bi bi-inbox fs-1 d-block mb-3"></i>
            <h5>Belum ada pengumuman</h5>
            <p>Pengumuman baru akan muncul di sini.</p>
        </div>
    </div>
</div>

<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
