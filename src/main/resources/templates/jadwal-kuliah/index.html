<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Jadwal Kuliah')}"></head>
<body>
<div th:replace="~{layout :: navbar(${activePage})}"></div>
<main class="container-fluid px-3 px-lg-4 py-4">
    <div class="page-heading">
        <div>
            <p class="eyebrow">CRUD & Plotting</p>
            <h1>Data Jadwal Kuliah</h1>
        </div>
        <a th:href="@{/jadwal-kuliah/new}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Tambah</a>
    </div>
    
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <section class="content-panel">
        <div class="table-responsive">
            <table class="table align-middle data-table">
                <thead>
                    <tr>
                        <th>Mata Kuliah</th>
                        <th>Dosen Pengajar</th>
                        <th>Hari & Jam</th>
                        <th>Ruangan</th>
                        <th>Pertemuan</th>
                        <th class="text-end">Aksi</th>
                    </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${jadwalKuliahPage.content}">
                    <td class="fw-semibold text-primary" th:text="${item.mataKuliah.nama} + ' (' + ${item.mataKuliah.kode} + ')'">Matkul</td>
                    <td th:text="${item.dosen.nama}">Dosen</td>
                    <td>
                        <span class="badge bg-info text-dark" th:text="${item.hari} + ', ' + ${item.jam}">Waktu</span>
                    </td>
                    <td th:text="${item.ruangan}">Ruangan</td>
                    <td th:text="${item.totalPertemuan}">14</td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/jadwal-kuliah/{id}/edit(id=${item.id})}" title="Edit"><i class="bi bi-pencil"></i></a>
                        <form th:action="@{/jadwal-kuliah/{id}/delete(id=${item.id})}" method="post" class="d-inline" data-confirm="Hapus data jadwal ini?">
                            <button class="btn btn-sm btn-outline-danger" type="submit" title="Hapus"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${jadwalKuliahPage.empty}">
                    <td colspan="6" class="text-center text-secondary py-5">
                        <i class="bi bi-calendar-x fs-2 d-block mb-2"></i>
                        Data jadwal kuliah tidak ditemukan.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        
        <nav th:if="${jadwalKuliahPage.totalPages > 1}">
            <ul class="pagination justify-content-end mb-0 mt-3">
                <li class="page-item" th:classappend="${jadwalKuliahPage.first} ? 'disabled' : ''">
                    <a class="page-link" th:href="@{/jadwal-kuliah(page=${jadwalKuliahPage.number - 1})}">Prev</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, jadwalKuliahPage.totalPages - 1)}" th:classappend="${i == jadwalKuliahPage.number} ? 'active' : ''">
                    <a class="page-link" th:href="@{/jadwal-kuliah(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${jadwalKuliahPage.last} ? 'disabled' : ''">
                    <a class="page-link" th:href="@{/jadwal-kuliah(page=${jadwalKuliahPage.number + 1})}">Next</a>
                </li>
            </ul>
        </nav>
    </section>
</main>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
